<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Milkidkk Unblocked Games – Working Version</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    header {
      background: #222;
      padding: 15px 20px;
      display: flex;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 240px;
      background: #181818;
      border-right: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .game-list button {
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      background: #262626;
      color: #fff;
      border: none;
      cursor: pointer;
      text-align: left;
      border-radius: 4px;
      font-size: 14px;
    }

    .game-list button:hover {
      background: #333;
    }

    .game-area {
      flex: 1;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    #placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #777;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <h1>Milkidkk Unblocked Games</h1>
</header>

<div class="container">
  <aside class="sidebar">
    <h3>Games</h3>
    <div class="game-list">
      <button onclick="loadGame('tetris')">Tetris</button>
      <button onclick="loadGame('flappy')">Flappy Bird</button>
      <button onclick="loadGame('snake')">Snake</button>
      <button onclick="loadGame('dino')">Dino Game</button>
      <button onclick="loadGame('2048')">2048</button>
      <button onclick="loadGame('chess')">Chess</button>
      <button onclick="loadGame('krunker')">Call of Duty (Krunker)</button>
      <button onclick="loadGame('ragdoll')">Ragdoll Archers</button>
    </div>
  </aside>

  <main class="game-area">
    <div id="placeholder">Choose a game to start playing.</div>

    <iframe id="tetris" src="https://tetris.com/play-tetris"></iframe>
    <iframe id="flappy" src="https://flappybird.io/"></iframe>
    <iframe id="snake" src="https://playsnake.org/"></iframe>
    <iframe id="dino" src="https://chromedino.com/"></iframe>
    <iframe id="2048" src="https://play2048.co/"></iframe>

    <!-- Working Chess -->
    <iframe id="chess" src="https://www.chessformer.com/chess/"></iframe>

    <!-- COD-style FPS -->
    <iframe id="krunker" src="https://krunker.io/"></iframe>

    <!-- Ragdoll Archers -->
    <iframe id="ragdoll" src="https://ragdoll-archers.github.io/"></iframe>
  </main>
</div>

<script>
  const games = [
    "tetris", "flappy", "snake", "dino", "2048",
    "chess", "krunker", "ragdoll"
  ];

  function loadGame(id) {
    document.getElementById("placeholder").style.display = "none";

    games.forEach(game => {
      const frame = document.getElementById(game);
      frame.style.display = (game === id) ? "block" : "none";
    });
  }
</script>

</body>
</html>
