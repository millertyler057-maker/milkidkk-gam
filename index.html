<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unblocked Games – Milkidkk Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    header {
      background: #222;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 20px;
    }

    .container {
      display: flex;
      height: calc(100vh - 60px);
    }

    .sidebar {
      width: 240px;
      background: #181818;
      border-right: 1px solid #333;
      padding: 10px;
      overflow-y: auto;
    }

    .sidebar h3 {
      margin-top: 0;
    }

    .game-list button {
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      background: #262626;
      color: #fff;
      border: none;
      cursor: pointer;
      text-align: left;
      border-radius: 4px;
      font-size: 14px;
    }

    .game-list button:hover {
      background: #333;
    }

    .game-area {
      flex: 1;
      background: #000;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    #placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #777;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>
  <h1>Milkidkk Unblocked Games</h1>
</header>

<div class="container">
  <aside class="sidebar">
    <h3>Games</h3>
    <div class="game-list">
      <button onclick="loadGame('crazy-office')">Crazy Office Slap & Smash</button>
      <button onclick="loadGame('teacher-simulator')">Teacher Simulator</button>
      <button onclick="loadGame('chess')">Chess</button>
    </div>
  </aside>

  <main class="game-area">
    <div id="placeholder">Choose a game to start playing.</div>

    <iframe id="crazy-office"
      src="https://crazy-office-slap-and-smash.game-files.crazygames.com/unity/unity2020/crazy-office-slap-and-smash.html?skipPrerollFirstSession=true">
    </iframe>

    <iframe id="teacher-simulator"
      src="https://teacher-simulator.game-files.crazygames.com/unity/unity56/teacher-simulator.html?skipPrerollFirstSession=true">
    </iframe>

    <iframe id="chess"
      src="https://www.chess.com/play/online">
    </iframe>
  </main>
</div>

<script>
  const games = ["crazy-office", "teacher-simulator", "chess"];

  function loadGame(id) {
    document.getElementById("placeholder").style.display = "none";

    games.forEach(game => {
      const frame = document.getElementById(game);
      frame.style.display = (game === id) ? "block" : "none";
    });
  }
</script>
